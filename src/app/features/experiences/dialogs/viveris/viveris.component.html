<app-dialog
  imgPath="icons/viveris.webp"
  [firstTitle]="translations().get(translatesEnum.VIVERIS)"
  [subtitle]="subTitle()"
  startDate="01/2021"
>
  <p>{{ translations().get(translatesEnum.VIVERIS_PARAGRAPH1) }}</p>
  <p>{{ translations().get(translatesEnum.VIVERIS_PARAGRAPH2) }}</p>

  <h3>{{ translations().get(translatesEnum.SKILLS_ACQUIRED) }}</h3>

  <ul>
    @for (bullet of bulletList; track bullet) {
      <li>{{ translations().get(bullet) }}</li>
    }
  </ul>

  <app-chips [chips]="chips"></app-chips>
</app-dialog>
